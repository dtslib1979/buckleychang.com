<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forum · Buckley Chang</title>
<meta name="description" content="Buckley 길드원·고객 공용 Discord 포럼">
<link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
<link rel="stylesheet" href="/assets/discord/discord.css">
<link rel="stylesheet" href="/assets/discord/buckleychang-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
  .forum-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.5rem 2rem;
    border-bottom:1px solid rgba(201,162,39,.2);
  }
  .forum-header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    background: linear-gradient(135deg, #c9a227, #e8c547);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    font-size: 1.1rem; letter-spacing: .2em;
  }
  .back-link { color: var(--muted); text-decoration: none; font-size: .85rem; font-family: 'Cinzel', serif; letter-spacing: .15em; }
  .back-link:hover { color: var(--gold); }
  #forum-wrap { padding: 1rem 2rem; min-height: 80vh; }
  .placeholder-card {
    max-width: 560px; margin: 40px auto; padding: 48px;
    background: rgba(201,162,39,.04); border: 1px dashed rgba(201,162,39,.3);
    border-radius: 20px; text-align: center;
  }
  .placeholder-card h2 {
    font-family: 'Cinzel', serif;
    margin-bottom: 16px; font-size: .9rem; letter-spacing: .25em;
    color: var(--gold);
  }
  .placeholder-card p { color: var(--muted); font-size: .9rem; line-height: 1.7; margin-bottom: 12px; }
  .placeholder-card code { background: rgba(0,0,0,.4); padding: 2px 8px; border-radius: 4px; color: var(--gold); font-size: .8rem; }
</style>
</head>
<body>
<header class="forum-header">
  <h1>FORUM · BUCKLEY CHANG</h1>
  <a href="/" class="back-link">← HOME</a>
</header>
<div id="forum-wrap"></div>
<script type="module">
  import { CFG } from '/assets/discord/config.js';
  import { injectForum } from '/assets/discord/widget-embed.js';
  const wrap = document.getElementById('forum-wrap');
  const isReady = CFG.FORUM_CH && !CFG.FORUM_CH.startsWith('PLACEHOLDER');
  if (isReady) {
    injectForum(wrap);
  } else {
    wrap.innerHTML = `
      <div class="placeholder-card">
        <h2>DISCORD FORUM · AWAITING CONFIGURATION</h2>
        <p>박씨가 <code>/assets/discord/config.js</code> 의 <code>FORUM_CH</code> 값을
        입력하면 Discord 포럼이 여기에 표시됩니다.</p>
        <p style="margin-top:16px;font-size:.8rem;color:var(--muted);">
        GUILD 는 phoneparis / papafly / namoneygoal 와 공유 중. buckleychang 전용 포럼 채널 ID 만 추가하면 됩니다.
        </p>
      </div>
    `;
  }
</script>
</body>
</html>
